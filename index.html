<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Børnebank</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
*{font-family:'Outfit',system-ui,sans-serif}
body{background:#0f0f14;color:#fff;min-height:100vh}
.btn{transition:all 0.15s}
.btn:active{transform:scale(0.96)}
.trans-row{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:nowrap}
.trans-amount{white-space:nowrap}
.trans-desc{max-width:50%;word-wrap:break-word;white-space:normal}
.trans-date{white-space:nowrap}
</style>
</head>
<body class="p-4">

<!-- Setup Screen -->
<div id="setupScreen" class="hidden text-center py-8">
<h1 class="text-3xl font-bold mb-8">🐷 Børnebank</h1>
<div class="bg-gray-800 rounded-xl p-6 mb-4">
<h2 class="text-xl font-bold mb-4">Opret familie</h2>
<button onclick="createFamily()" class="w-full bg-green-500 text-black font-bold py-3 rounded-xl">Opret ny familie</button>
</div>
<div class="bg-gray-800 rounded-xl p-6">
<h2 class="text-xl font-bold mb-4">Tilmeld eksisterende familie</h2>
<input type="text" id="joinFamilyCode" placeholder="Familie-kode" class="w-full bg-gray-700 rounded-lg px-4 py-3 mb-3">
<button onclick="joinFamily()" class="w-full bg-blue-500 text-white font-bold py-3 rounded-xl">Tilmeld</button>
</div>
</div>

<div id="home">
<div class="flex justify-between items-center mb-4">
<h1 class="text-2xl font-bold">🐷 Børnebank</h1>
<span id="familyCodeDisplay" class="text-xs text-gray-500 bg-gray-800 px-2 py-1 rounded"></span>
</div>

<div id="childrenList" class="space-y-3 mb-4"></div>

<button onclick="showAddChild()" class="w-full bg-green-500 hover:bg-green-600 text-black font-bold py-4 rounded-xl btn mb-4">
+ Tilføj barn
</button>

<!-- Renter settings -->
<div class="bg-gray-800 rounded-xl p-4">
<div class="flex justify-between items-center mb-3">
<span class="font-semibold">💰 Renter</span>
<button onclick="toggleInterest()" id="interestToggle" class="text-green-400 text-sm">SLÅET TIL</button>
</div>
<div id="interestSettings" class="flex gap-2 items-center">
<input type="number" id="interestRate" value="2" min="0" max="100" step="0.1" class="bg-gray-700 rounded-lg px-3 py-2 w-20 text-center" onchange="updateInterest()">
<span class="text-sm text-gray-400">% pr.</span>
<select id="interestFreq" class="bg-gray-700 rounded-lg px-3 py-2" onchange="updateInterest()">
<option value="1">Måned</option>
<option value="3" selected>Kvartal</option>
<option value="12">År</option>
</select>
</div>
</div>
</div>

<!-- Add Child Modal -->
<div id="addChild" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
<div class="bg-gray-800 rounded-2xl p-6 w-full max-w-sm">
<h2 class="text-xl font-bold mb-4">Nyt barn</h2>

<label class="block text-sm text-gray-400 mb-1">Navn</label>
<input type="text" id="childName" placeholder="Navn" class="w-full bg-gray-700 rounded-lg px-4 py-3 mb-3">

<label class="block text-sm text-gray-400 mb-1">Fødselsdato</label>
<input type="date" id="childBirth" class="w-full bg-gray-700 rounded-lg px-4 py-3 mb-3">

<label class="block text-sm text-gray-400 mb-1">Lommepenge (kr.)</label>
<input type="number" id="childAllowance" placeholder="0" min="0" class="w-full bg-gray-700 rounded-lg px-4 py-3 mb-4">
<span id="allowanceLabel" class="text-sm text-gray-500"></span>

<div class="flex gap-3">
<button onclick="hideAddChild()" class="flex-1 bg-gray-600 py-3 rounded-lg font-semibold">Annuller</button>
<button onclick="saveChild()" class="flex-1 bg-green-500 text-black font-bold py-3 rounded-lg">Gem</button>
</div>
</div>
</div>

<!-- Child Detail -->
<div id="childDetail" class="hidden">
<button onclick="showHome()" class="text-gray-400 mb-4 btn">← Tilbage</button>

<div class="bg-gray-800 rounded-2xl p-6 mb-4 text-center">
<h2 id="detailName" class="text-2xl font-bold mb-2"></h2>
<p id="detailAge" class="text-gray-400 mb-2"></p>
<p class="text-4xl font-bold text-green-400 mb-2"><span id="detailSaldo">0</span> kr</p>
<p class="text-sm text-gray-500">Næste lommepenge: <span id="nextFriday"></span></p>
</div>

<div class="bg-gray-800 rounded-2xl p-4 mb-4">
<h3 class="font-semibold mb-3">Lommepenge/uge</h3>
<div class="flex items-center justify-between">
<button onclick="changeAllowance(-1)" class="bg-red-500 text-white w-10 h-10 rounded-full text-xl font-bold">-</button>
<span id="allowanceAmount" class="text-2xl font-bold">0 kr</span>
<button onclick="changeAllowance(1)" class="bg-green-500 text-black w-10 h-10 rounded-full text-xl font-bold">+</button>
</div>
<p class="text-xs text-gray-500 mt-2">Ændringer gælder fra næste fredag kl. 15</p>
</div>

<div class="bg-gray-800 rounded-2xl p-4 mb-4">
<h3 class="font-semibold mb-3">Ny transaktion</h3>
<div class="flex gap-2 mb-3">
<button onclick="setTransType(1)" id="btnPlus" class="flex-1 bg-green-500 text-black font-bold py-2 rounded-lg">+</button>
<button onclick="setTransType(-1)" id="btnMinus" class="flex-1 bg-gray-600 font-bold py-2 rounded-lg">-</button>
</div>
<input type="number" id="transAmount" placeholder="Beløb" class="w-full bg-gray-700 rounded-lg px-4 py-3 mb-3">
<select id="transDesc" class="w-full bg-gray-700 rounded-lg px-4 py-3 mb-3">
<option value="">Vælg beskrivelse...</option>
</select>
<button onclick="addTransaction()" class="w-full bg-green-500 text-black font-bold py-3 rounded-lg">Tilføj</button>
</div>

<h3 class="font-semibold mb-3">Transaktioner</h3>
<div id="transList" class="space-y-2 mb-4"></div>

<button onclick="confirmDelete()" class="w-full bg-red-600 font-bold py-3 rounded-lg mt-8 btn">Slet barn</button>
</div>

<!-- Delete Confirm -->
<div id="deleteConfirm" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
<div class="bg-gray-800 rounded-2xl p-6 w-full max-w-sm text-center">
<h2 class="text-xl font-bold mb-4">Slet <span id="deleteName"></span>?</h2>
<p class="text-gray-400 mb-6">Dette kan ikke fortrydes!</p>
<div class="flex gap-3">
<button onclick="hideDeleteConfirm()" class="flex-1 bg-gray-600 py-3 rounded-lg font-semibold btn">Fortryd</button>
<button onclick="deleteChild()" class="flex-1 bg-red-600 font-bold py-3 rounded-lg btn">Slet</button>
</div>
</div>
</div>

<!-- Delete Trans Confirm -->
<div id="deleteTransConfirm" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
<div class="bg-gray-800 rounded-2xl p-6 w-full max-w-sm text-center">
<h2 class="text-xl font-bold mb-4">Slet transaktion?</h2>
<p class="text-gray-400 mb-2" id="deleteTransAmount"></p>
<p class="text-gray-500 text-sm" id="deleteTransDesc"></p>
<div class="flex gap-3 mt-6">
<button onclick="hideDeleteTransConfirm()" class="flex-1 bg-gray-600 py-3 rounded-lg font-semibold btn">Fortryd</button>
<button onclick="deleteTransaction()" class="flex-1 bg-red-600 font-bold py-3 rounded-lg btn">Slet</button>
</div>
</div>
</div>

<script>
// Supabase config
const SUPABASE_URL = 'https://shbthjbunfcotbfbixxe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNoYnRoamJ1bmZjb3RiZmJpeHhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDQ5MzYsImV4cCI6MjA4OTUyMDkzNn0.86q3qAVmqtR5LM1xhRs4ce66Tm5E51hGDSeXomIqUPU';
let familyId = localStorage.getItem('bornbank_family');
let parentToken = localStorage.getItem('bornbank_parent');

async function syncToSupabase() {
  if (!familyId) return;
  const data = {children, interest, _timestamp: Date.now()};
  try {
    await fetch(SUPABASE_URL + '/rest/v1/families?id=eq.' + familyId, {
      method: 'PUT',
      headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json'},
      body: JSON.stringify({id: familyId, parent_token: parentToken, data: JSON.stringify(data)})
    });
  } catch(e) { console.log('Sync error:', e); }
}

async function syncFromSupabase() {
  if (!familyId) return null;
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/families?id=eq.' + familyId + '&select=data', {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
    });
    const rows = await res.json();
    if (rows && rows[0] && rows[0].data) return JSON.parse(rows[0].data);
  } catch(e) { console.log('Load error:', e); }
  return null;
}

function generateId() {
  return Math.random().toString(36).substring(2, 8).toUpperCase();
}

async function createFamily() {
  familyId = generateId();
  parentToken = familyId + '-' + generateId();
  localStorage.setItem('bornbank_family', familyId);
  localStorage.setItem('bornbank_parent', parentToken);
  children = [];
  interest = {enabled:true, rate:2, freq:3, lastInterest:''};
  save();
  // Create in Supabase
  try {
    await fetch(SUPABASE_URL + '/rest/v1/families', {
      method: 'POST',
      headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json'},
      body: JSON.stringify({id: familyId, parent_token: parentToken, data: JSON.stringify({children, interest, _timestamp: Date.now()})})
    });
  } catch(e) { console.log('Create error:', e); }
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  location.reload();
}

function joinFamily() {
  const code = document.getElementById('joinFamilyCode').value.trim().toUpperCase();
  if (!code) return alert('Indtast en familie-kode!');
  familyId = code;
  localStorage.setItem('bornbank_family', familyId);
  location.reload();
}

let children = JSON.parse(localStorage.getItem('bornbank') || '[]');
let interest = JSON.parse(localStorage.getItem('bornbank_interest') || '{"enabled":true,"rate":2,"freq":3}');
let currentChild = null;
let transType = 1;

const POS_OPTS = ['Pligter', 'Gave', 'Andet'];
const NEG_OPTS = ['Tøj', 'Underholdning', 'Andet'];

function fmt(n) {
if(isNaN(n)) return "0";
return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function save() {
localStorage.setItem('bornbank', JSON.stringify(children));
localStorage.setItem('bornbank_interest', JSON.stringify(interest));
syncToSupabase();
render();
}

function render() {
if (familyId) document.getElementById('familyCodeDisplay').textContent = 'Familie: ' + familyId;
const list = document.getElementById('childrenList');
list.innerHTML = '';
children.forEach((c, i) => {
list.innerHTML += `
<div onclick="openChild(${i})" class="bg-gray-800 rounded-xl p-4 flex justify-between items-center btn">
<div>
<div class="font-bold text-lg">${c.name}</div>
<div class="text-sm text-gray-400">${c.age} år • ${fmt(c.allowance)} kr/uge</div>
</div>
<div class="text-2xl font-bold ${c.saldo >= 0 ? 'text-green-400' : 'text-red-400'}">${fmt(c.saldo)} kr</div>
</div>
`;
});
document.getElementById('interestRate').value = interest.rate;
document.getElementById('interestFreq').value = interest.freq;
document.getElementById('interestToggle').textContent = interest.enabled ? 'SLÅET TIL' : 'SLÅET FRA';
document.getElementById('interestToggle').className = interest.enabled ? 'text-green-400 text-sm' : 'text-gray-500 text-sm';
document.getElementById('interestSettings').style.display = interest.enabled ? 'flex' : 'none';
}

function getAge(birthDate) {
const today = new Date();
const birth = new Date(birthDate);
let age = today.getFullYear() - birth.getFullYear();
const m = today.getMonth() - birth.getMonth();
if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) {
age--;
}
return age;
}

function getNextFriday() {
const now = new Date();
const friday = new Date(now);
friday.setDate(now.getDate() + (5 - now.getDay() + 7) % 7);
friday.setHours(15,0,0,0);
if(friday <= now) friday.setDate(friday.getDate() + 7);
return friday.toLocaleDateString('da-DK', {weekday:'long', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
}

function getNextFridayDate() {
const now = new Date();
const friday = new Date(now);
friday.setDate(now.getDate() + (5 - now.getDay() + 7) % 7);
friday.setHours(15,0,0,0);
if(friday <= now) friday.setDate(friday.getDate() + 7);
return friday;
}

// Auto-process: Run on load to check for pending allowance/interest
function processAutoTransactions() {
const now = new Date();
let processed = false;

children.forEach(c => {
if(!c.lastProcessed) c.lastProcessed = now.toISOString();

// Check for pending allowance payments
if(c.lastProcessed) {
const lastProc = new Date(c.lastProcessed);
const nextFriday = getNextFridayDate();

while(nextFriday <= now && nextFriday > lastProc) {
const amount = c.allowance || 0;
if(amount > 0) {
c.saldo += amount;
c.transactions.unshift({
date: now.toISOString(),
amount: amount,
desc: 'Lommepenge (auto)'
});
processed = true;
}
// Move to next friday
const next = new Date(lastProc);
next.setDate(next.getDate() + 7);
c.lastProcessed = next.toISOString();
}
}

// Check for pending interest
if(interest.enabled && c.lastInterestPayout) {
const lastPayout = new Date(c.lastInterestPayout);
const months = (now.getFullYear() - lastPayout.getFullYear()) * 12 + now.getMonth() - lastPayout.getMonth();
const freq = interest.freq || 3;
if(months >= (12/freq)) {
const periods = Math.floor(months / (12/freq));
const rate = interest.rate || 2;
const interestAmount = Math.round(c.saldo * (rate/100) * (periods * (freq/12)));
if(interestAmount > 0) {
c.saldo += interestAmount;
c.transactions.unshift({
date: now.toISOString(),
amount: interestAmount,
desc: `Rente (auto)`
});
processed = true;
}
c.lastInterestPayout = now.toISOString();
}
}

if(!c.lastInterestPayout) {
c.lastInterestPayout = now.toISOString();
}
});

if(processed) {
save();
}
}

function toggleInterest() {
interest.enabled = !interest.enabled;
save();
}

function updateInterest() {
interest.rate = parseFloat(document.getElementById('interestRate').value) || 0;
interest.freq = parseInt(document.getElementById('interestFreq').value);
save();
}

function showAddChild() { document.getElementById('addChild').classList.remove('hidden'); }
function hideAddChild() { 
document.getElementById('addChild').classList.add('hidden');
document.getElementById('childName').value = '';
document.getElementById('childBirth').value = '';
document.getElementById('childAllowance').value = '';
document.getElementById('allowanceLabel').textContent = '';
}

function updateDescOptions() {
const sel = document.getElementById('transDesc');
const opts = transType === -1 ? NEG_OPTS : POS_OPTS;
sel.innerHTML = '<option value="">Vælg...</option>';
opts.forEach(o => { sel.innerHTML += '<option value="'+o+'">'+o+'</option>'; });
}

function saveChild() {
const name = document.getElementById('childName').value.trim();
const birth = document.getElementById('childBirth').value;
let allowance = parseInt(document.getElementById('childAllowance').value) || 0;
if(allowance < 0) allowance = 0;
if(!name) return alert('Indtast et navn!');
if(!birth) return alert('Vælg en fødselsdato!');

children.push({
name, 
birth, 
age: getAge(birth), 
allowance, 
saldo: 0, 
transactions: [], 
nextPay: getNextFriday(),
lastProcessed: new Date().toISOString(),
lastInterestPayout: new Date().toISOString()
});
save();
hideAddChild();
}

function showHome() {
document.getElementById('home').classList.remove('hidden');
document.getElementById('childDetail').classList.add('hidden');
currentChild = null;
render();
}

function openChild(i) {
currentChild = i;
const c = children[i];
document.getElementById('home').classList.add('hidden');
document.getElementById('childDetail').classList.remove('hidden');
document.getElementById('detailName').textContent = c.name;
document.getElementById('detailAge').textContent = c.age + ' år';
document.getElementById('detailSaldo').textContent = fmt(c.saldo);
document.getElementById('nextFriday').textContent = c.nextPay || getNextFriday();
document.getElementById('allowanceAmount').textContent = fmt(c.allowance) + ' kr';
updateDescOptions();
renderTrans();
}

function setTransType(t) {
transType = t;
document.getElementById('btnPlus').className = t === 1 ? 'flex-1 bg-green-500 text-black font-bold py-2 rounded-lg' : 'flex-1 bg-gray-600 font-bold py-2 rounded-lg';
document.getElementById('btnMinus').className = t === -1 ? 'flex-1 bg-red-500 text-white font-bold py-2 rounded-lg' : 'flex-1 bg-gray-600 font-bold py-2 rounded-lg';
updateDescOptions();
}

function addTransaction() {
const amount = parseInt(document.getElementById('transAmount').value) || 0;
const desc = document.getElementById('transDesc').value;
if(!amount) return alert('Indtast et beløb!');

const finalAmount = amount * transType;
children[currentChild].saldo += finalAmount;
children[currentChild].transactions.unshift({
date: new Date().toISOString(),
amount: finalAmount,
desc: desc || 'Transaktion'
});
children[currentChild].nextPay = getNextFriday();
save();

document.getElementById('detailSaldo').textContent = fmt(children[currentChild].saldo);
document.getElementById('transAmount').value = '';
document.getElementById('transDesc').value = '';
renderTrans();
}

function renderTrans() {
const c = children[currentChild];
const list = document.getElementById('transList');
list.innerHTML = '';
c.transactions.forEach((t, idx) => {
const isNeg = t.amount < 0;
const desc = t.desc || 'Transaktion';
const date = new Date(t.date).toLocaleDateString('da-DK');
list.innerHTML += `
<div class="bg-gray-700 rounded-lg p-3 trans-row">
<div class="flex items-center gap-2 flex-1 min-w-0">
<span class="trans-amount font-semibold ${isNeg ? 'text-red-400' : 'text-green-400'} text-lg">${isNeg ? '' : '+'}${fmt(t.amount)} kr</span>
<span class="trans-desc text-gray-300 text-sm">${desc}</span>
</div>
<div class="flex items-center gap-2">
<span class="trans-date text-xs text-gray-500">${date}</span>
<button onclick="confirmDeleteTrans(${idx})" class="text-red-400 text-xs px-2 py-1">✕</button>
</div>
</div>
`;
});
}

function changeAllowance(delta) {
children[currentChild].allowance += delta;
if(children[currentChild].allowance < 0) children[currentChild].allowance = 0;
document.getElementById('allowanceAmount').textContent = fmt(children[currentChild].allowance) + ' kr';
children[currentChild].nextPay = getNextFriday();
document.getElementById('nextFriday').textContent = children[currentChild].nextPay;
save();
}

function confirmDelete() {
document.getElementById('deleteName').textContent = children[currentChild].name;
document.getElementById('deleteConfirm').classList.remove('hidden');
}

function hideDeleteConfirm() {
document.getElementById('deleteConfirm').classList.add('hidden');
}

function deleteChild() {
children.splice(currentChild, 1);
save();
hideDeleteConfirm();
showHome();
}

function confirmDeleteTrans(idx) {
deleteTransIndex = idx;
const t = children[currentChild].transactions[idx];
document.getElementById('deleteTransAmount').innerHTML = `<span class="${t.amount < 0 ? 'text-red-400' : 'text-green-400'}">${t.amount > 0 ? '+' : ''}${fmt(t.amount)} kr</span>`;
document.getElementById('deleteTransDesc').textContent = t.desc;
document.getElementById('deleteTransConfirm').classList.remove('hidden');
}

function hideDeleteTransConfirm() {
document.getElementById('deleteTransConfirm').classList.add('hidden');
deleteTransIndex = null;
}

function deleteTransaction() {
if(deleteTransIndex !== null) {
children[currentChild].saldo -= children[currentChild].transactions[deleteTransIndex].amount;
children[currentChild].transactions.splice(deleteTransIndex, 1);
save();
document.getElementById('detailSaldo').textContent = fmt(children[currentChild].saldo);
renderTrans();
}
hideDeleteTransConfirm();
}

// Initialize
let lastSyncTime = 0;

async function init() {
  if (!familyId) {
    document.getElementById('setupScreen').classList.remove('hidden');
    document.getElementById('home').classList.add('hidden');
  } else {
    const supabaseData = await syncFromSupabase();
    if (supabaseData) {
      children = supabaseData.children || [];
      interest = supabaseData.interest || {enabled:true,rate:2,freq:3};
    }
    // Start realtime sync (check every 3 seconds for changes)
    setInterval(async () => {
      const data = await syncFromSupabase();
      if (data && data._timestamp && data._timestamp > lastSyncTime) {
        children = data.children || [];
        interest = data.interest || {enabled:true,rate:2,freq:3};
        lastSyncTime = data._timestamp;
        render();
      }
    }, 3000);
  }
  processAutoTransactions();
  render();
}
init();
</script>
</body>
</html>
