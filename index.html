<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Børnebank</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
*{font-family:'Outfit',system-ui,sans-serif}
body{background:#0f0f14;color:#fff;min-height:100vh}
.btn{transition:all 0.2s}
.btn:active{transform:scale(0.95)}
.neg{-color:#ef4444}
</style>
</head>
<body class="p-4">

<div id="home">
<div class="flex justify-between items-center mb-6">
<h1 class="text-2xl font-bold">🐷 Børnebank</h1>
</div>

<div id="childrenList" class="space-y-3 mb-6"></div>

<button onclick="showAddChild()" class="w-full bg-green-500 hover:bg-green-600 text-black font-bold py-4 rounded-xl btn mb-4">
+ Tilføj barn
</button>

<!-- Renter settings -->
<div class="bg-gray-800 rounded-xl p-4">
<div class="flex justify-between items-center mb-3">
<span class="font-semibold">💰 Renter</span>
<button onclick="toggleInterest()" id="interestToggle" class="text-green-400 text-sm">SLÅET TIL</button>
</div>
<div id="interestSettings" class="flex gap-2 items-center">
<input type="number" id="interestRate" value="2" min="0" max="100" step="0.1" class="bg-gray-700 rounded-lg px-3 py-2 w-20 text-center" onchange="updateInterest()">
<span class="text-sm text-gray-400">% pr.</span>
<select id="interestFreq" class="bg-gray-700 rounded-lg px-3 py-2" onchange="updateInterest()">
<option value="1">Måned</option>
<option value="3" selected>Kvartal</option>
<option value="12">År</option>
</select>
</div>
</div>
</div>

<!-- Add Child Modal -->
<div id="addChild" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
<div class="bg-gray-800 rounded-2xl p-6 w-full max-w-sm">
<h2 class="text-xl font-bold mb-4">Nyt barn</h2>
<input type="text" id="childName" placeholder="Navn" class="w-full bg-gray-700 rounded-lg px-4 py-3 mb-3">
<input type="number" id="childAge" placeholder="Alder" class="w-full bg-gray-700 rounded-lg px-4 py-3 mb-3">
<input type="number" id="childAllowance" placeholder="Lommepenge/uge (kr)" class="w-full bg-gray-700 rounded-lg px-4 py-3 mb-4">
<div class="flex gap-3">
<button onclick="hideAddChild()" class="flex-1 bg-gray-600 py-3 rounded-lg font-semibold">Annuller</button>
<button onclick="saveChild()" class="flex-1 bg-green-500 text-black font-bold py-3 rounded-lg">Gem</button>
</div>
</div>
</div>

<!-- Child Detail -->
<div id="childDetail" class="hidden">
<button onclick="showHome()" class="text-gray-400 mb-4">← Tilbage</button>

<div class="bg-gray-800 rounded-2xl p-6 mb-4 text-center">
<h2 id="detailName" class="text-2xl font-bold mb-2"></h2>
<p id="detailAge" class="text-gray-400 mb-2"></p>
<p class="text-4xl font-bold text-green-400 mb-2"><span id="detailSaldo">0</span> kr</p>
<p class="text-sm text-gray-500">Næste lommepenge: <span id="nextFriday"></span></p>
</div>

<div class="bg-gray-800 rounded-2xl p-4 mb-4">
<h3 class="font-semibold mb-3">Lommepenge/uge</h3>
<div class="flex items-center justify-between">
<button onclick="changeAllowance(-10)" class="bg-red-500 text-white w-12 h-12 rounded-full text-2xl font-bold">-</button>
<span id="allowanceAmount" class="text-2xl font-bold">0</span>
<button onclick="changeAllowance(10)" class="bg-green-500 text-black w-12 h-12 rounded-full text-2xl font-bold">+</button>
</div>
<p class="text-xs text-gray-500 mt-2">Ændringer gælder fra næste fredag kl. 15</p>
</div>

<div class="bg-gray-800 rounded-2xl p-4 mb-4">
<h3 class="font-semibold mb-3">Ny transaktion</h3>
<div class="flex gap-2 mb-3">
<button onclick="setTransType(1)" id="btnPlus" class="flex-1 bg-green-500 text-black font-bold py-2 rounded-lg">+</button>
<button onclick="setTransType(-1)" id="btnMinus" class="flex-1 bg-gray-600 font-bold py-2 rounded-lg">-</button>
</div>
<input type="number" id="transAmount" placeholder="Beløb" class="w-full bg-gray-700 rounded-lg px-4 py-3 mb-3">
<input type="text" id="transDesc" placeholder="Beskrivelse" class="w-full bg-gray-700 rounded-lg px-4 py-3 mb-3">
<button onclick="addTransaction()" class="w-full bg-green-500 text-black font-bold py-3 rounded-lg">Tilføj</button>
</div>

<h3 class="font-semibold mb-3">Transaktioner</h3>
<div id="transList" class="space-y-2 mb-4"></div>

<button onclick="confirmDelete()" class="w-full bg-red-600 font-bold py-3 rounded-lg mt-8">Slet barn</button>
</div>

<!-- Delete Confirm -->
<div id="deleteConfirm" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
<div class="bg-gray-800 rounded-2xl p-6 w-full max-w-sm text-center">
<h2 class="text-xl font-bold mb-4">Slet <span id="deleteName"></span>?</h2>
<p class="text-gray-400 mb-6">Dette kan ikke fortrydes!</p>
<div class="flex gap-3">
<button onclick="hideDeleteConfirm()" class="flex-1 bg-gray-600 py-3 rounded-lg font-semibold">Fortryd</button>
<button onclick="deleteChild()" class="flex-1 bg-red-600 font-bold py-3 rounded-lg">Slet</button>
</div>
</div>
</div>

<script>
let children = JSON.parse(localStorage.getItem('bornbank') || '[]');
let interest = JSON.parse(localStorage.getItem('bornbank_interest') || '{"enabled":true,"rate":2,"freq":3}');
let currentChild = null;
let transType = 1;

function fmt(n) {
return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function save() {
localStorage.setItem('bornbank', JSON.stringify(children));
render();
}

function render() {
const list = document.getElementById('childrenList');
list.innerHTML = '';
children.forEach((c, i) => {
list.innerHTML += `
<div onclick="openChild(${i})" class="bg-gray-800 rounded-xl p-4 flex justify-between items-center btn">
<div>
<div class="font-bold text-lg">${c.name}</div>
<div class="text-sm text-gray-400">${c.age} år • ${fmt(c.allowance)} kr/uge</div>
</div>
<div class="text-2xl font-bold ${c.saldo >= 0 ? 'text-green-400' : 'text-red-400'}">${fmt(c.saldo)} kr</div>
</div>
`;
});
document.getElementById('interestRate').value = interest.rate;
document.getElementById('interestFreq').value = interest.freq;
document.getElementById('interestToggle').textContent = interest.enabled ? 'SLÅET TIL' : 'SLÅET FRA';
document.getElementById('interestToggle').className = interest.enabled ? 'text-green-400 text-sm' : 'text-gray-500 text-sm';
document.getElementById('interestSettings').style.display = interest.enabled ? 'flex' : 'none';
}

function getNextFriday() {
const now = new Date();
const friday = new Date(now);
friday.setDate(now.getDate() + (5 - now.getDay() + 7) % 7);
friday.setHours(15,0,0,0);
if(friday <= now) friday.setDate(friday.getDate() + 7);
return friday.toLocaleDateString('da-DK', {weekday:'long', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
}

function toggleInterest() {
interest.enabled = !interest.enabled;
save();
}

function updateInterest() {
interest.rate = parseFloat(document.getElementById('interestRate').value) || 0;
interest.freq = parseInt(document.getElementById('interestFreq').value);
save();
}

function showAddChild() { document.getElementById('addChild').classList.remove('hidden'); }
function hideAddChild() { 
document.getElementById('addChild').classList.add('hidden');
document.getElementById('childName').value = '';
document.getElementById('childAge').value = '';
document.getElementById('childAllowance').value = '';
}

function saveChild() {
const name = document.getElementById('childName').value.trim();
const age = parseInt(document.getElementById('childAge').value) || 0;
const allowance = parseInt(document.getElementById('childAllowance').value) || 0;
if(!name) return alert('Indtast et navn!');

children.push({name, age, allowance, saldo: 0, transactions: [], nextPay: getNextFriday()});
save();
hideAddChild();
}

function showHome() {
document.getElementById('home').classList.remove('hidden');
document.getElementById('childDetail').classList.add('hidden');
currentChild = null;
render();
}

function openChild(i) {
currentChild = i;
const c = children[i];
document.getElementById('home').classList.add('hidden');
document.getElementById('childDetail').classList.remove('hidden');
document.getElementById('detailName').textContent = c.name;
document.getElementById('detailAge').textContent = c.age + ' år';
document.getElementById('detailSaldo').textContent = c.saldo;
document.getElementById('nextFriday').textContent = c.nextPay;
document.getElementById('allowanceAmount').textContent = c.allowance;
renderTrans();
}

function setTransType(t) {
transType = t;
document.getElementById('btnPlus').className = t === 1 ? 'flex-1 bg-green-500 text-black font-bold py-2 rounded-lg' : 'flex-1 bg-gray-600 font-bold py-2 rounded-lg';
document.getElementById('btnMinus').className = t === -1 ? 'flex-1 bg-red-500 text-white font-bold py-2 rounded-lg' : 'flex-1 bg-gray-600 font-bold py-2 rounded-lg';
}

function addTransaction() {
const amount = parseInt(document.getElementById('transAmount').value) || 0;
const desc = document.getElementById('transDesc').value.trim() || 'Transaktion';
if(!amount) return alert('Indtast et beløb!');

children[currentChild].saldo += amount * transType;
children[currentChild].transactions.unshift({
date: new Date().toISOString(),
amount: amount * transType,
desc: desc
});
children[currentChild].nextPay = getNextFriday();
save();

document.getElementById('detailSaldo').textContent = children[currentChild].saldo;
document.getElementById('transAmount').value = '';
document.getElementById('transDesc').value = '';
renderTrans();
}

function renderTrans() {
const c = children[currentChild];
const list = document.getElementById('transList');
list.innerHTML = '';
c.transactions.forEach(t => {
const isNeg = t.amount < 0;
list.innerHTML += `
<div class="bg-gray-700 rounded-lg p-3 flex justify-between items-center">
<div>
<div class="font-semibold ${isNeg ? 'text-red-400' : 'text-green-400'}">${t.amount > 0 ? '+' : ''}${t.amount} kr</div>
<div class="text-sm text-gray-400">${t.desc}</div>
</div>
<div class="text-xs text-gray-500">${new Date(t.date).toLocaleDateString('da-DK')}</div>
</div>
`;
});
}

function changeAllowance(delta) {
children[currentChild].allowance += delta;
if(children[currentChild].allowance < 0) children[currentChild].allowance = 0;
document.getElementById('allowanceAmount').textContent = children[currentChild].allowance;
children[currentChild].nextPay = getNextFriday();
document.getElementById('nextFriday').textContent = children[currentChild].nextPay;
save();
}

function confirmDelete() {
document.getElementById('deleteName').textContent = children[currentChild].name;
document.getElementById('deleteConfirm').classList.remove('hidden');
}

function hideDeleteConfirm() {
document.getElementById('deleteConfirm').classList.add('hidden');
}

function deleteChild() {
children.splice(currentChild, 1);
save();
hideDeleteConfirm();
showHome();
}

render();
</script>
</body>
</html>
